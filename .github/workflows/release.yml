name: Release

on:
  release:
    types: [published]

permissions:
  contents: write  # needed to upload release assets

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # MinVer needs the full tag history to compute the version
        fetch-tags: true # fetch-depth: 0 alone does not guarantee tags are fetched

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore src/Mynatime/Mynatime.CLI.csproj

    - name: Read version
      id: version
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Publish
      run: |
        dotnet publish src/Mynatime/Mynatime.CLI.csproj \
          -c Release \
          -r linux-x64 \
          --no-self-contained \
          -p:MinVerVersion=${{ steps.version.outputs.version }} \
          -o dist/publish

    - name: Build tarball
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mv dist/publish/Mynatime.CLI dist/publish/mynatime
        mkdir -p dist
        tar -czf "dist/mynatime-${VERSION}-linux-x64.tar.gz" \
          -C dist/publish \
          --transform 's,^,mynatime/,' \
          .
        echo "TARBALL=dist/mynatime-${VERSION}-linux-x64.tar.gz" >> "$GITHUB_ENV"

    - name: Upload to release
      run: gh release upload "${{ github.ref_name }}" "$TARBALL"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-zip-windows:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # MinVer needs the full tag history to compute the version
        fetch-tags: true # fetch-depth: 0 alone does not guarantee tags are fetched

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore src/Mynatime/Mynatime.CLI.csproj

    - name: Read version
      id: version
      run: |
        VERSION="${{ github.ref_name }}"
        VERSION="${VERSION#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Publish
      run: |
        dotnet publish src/Mynatime/Mynatime.CLI.csproj \
          -c Release \
          -r win-x64 \
          --no-self-contained \
          -p:MinVerVersion=${{ steps.version.outputs.version }} \
          -o dist/publish

    - name: Build zip
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mv dist/publish/Mynatime.CLI.exe dist/publish/mynatime.exe
        printf '@echo off\r\n"%%~dp0mynatime.exe" %%*\r\n' > dist/publish/m.bat
        cd dist/publish
        zip -r "../mynatime-${VERSION}-win-x64.zip" . -x "*.pdb"
        echo "ZIP=dist/mynatime-${VERSION}-win-x64.zip" >> "$GITHUB_ENV"

    - name: Upload to release
      run: gh release upload "${{ github.ref_name }}" "$ZIP"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
